<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News App</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#1d4350,#a43931);
    min-height:100vh;
    padding:30px;
}

.container{

    max-width:900px;
    margin:auto;
    text-align:center;

}

h1{

    color:white;
    margin-bottom:25px;

}

.search{

    display:flex;
    gap:10px;
    justify-content:center;
    margin-bottom:30px;

}

input{

    width:70%;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:18px;
    outline:none;

}

button{

    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:#2196f3;
    color:white;
    cursor:pointer;
    font-size:18px;
    transition:.3s;

}

button:hover{

    background:#1565c0;

}

#news{

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;

}

.card{

    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.2);
    text-align:left;

}

.card img{

    width:100%;
    height:200px;
    object-fit:cover;

}

.content{

    padding:15px;

}

.content h2{

    font-size:20px;
    margin-bottom:10px;

}

.content p{

    color:#555;
    margin-bottom:10px;

}

.content small{

    color:gray;

}

.content a{

    display:inline-block;
    margin-top:10px;
    text-decoration:none;
    color:#2196f3;
    font-weight:bold;

}

</style>

</head>
<body>

<div class="container">

<h1>📰 News App</h1>

<div class="search">

<input
type="text"
id="query"
placeholder="Enter topic, city, country, company...">

<button onclick="getNews()">
Search
</button>

</div>

<div id="news"></div>

</div>

<script>

const apiKey = "d6777a65ce864382821f512ecc97f18e";

async function getNews(){

    const query=document.getElementById("query").value.trim();

    if(query===""){

        alert("Please enter a topic or location");
        return;

    }

    const today=new Date();

    const lastMonth=new Date();

    lastMonth.setMonth(lastMonth.getMonth()-1);

    const from=lastMonth.toISOString().split("T")[0];

    const url=`https://newsapi.org/v2/everything?q=${encodeURIComponent(query)}&from=${from}&sortBy=publishedAt&language=en&apiKey=${apiKey}`;

    try{

        const response=await fetch(url);

        const data=await response.json();

        if(data.status!=="ok"){

            alert(data.message);
            return;

        }

        let output="";

        if(data.articles.length===0){

            output="<h2 style='color:white;'>No News Found</h2>";

        }else{

            data.articles.forEach(article=>{

                output+=`

                <div class="card">

                <img src="${article.urlToImage || 'https://via.placeholder.com/400x200?text=No+Image'}">

                <div class="content">

                <h2>${article.title}</h2>

                <p>${article.description || "No description available."}</p>

                <small>
                Source : ${article.source.name}<br>
                ${new Date(article.publishedAt).toLocaleString()}
                </small>

                <br>

                <a href="${article.url}" target="_blank">
                Read Full Article →
                </a>

                </div>

                </div>

                `;

            });

        }

        document.getElementById("news").innerHTML=output;

    }

    catch(error){

        alert("Unable to fetch news.");

    }

}

document.getElementById("query").addEventListener("keypress",function(e){

    if(e.key==="Enter"){

        getNews();

    }

});

</script>

</body>
</html>
